name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Auto-generate Schedules/manifest.json
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dir = 'Schedules';
          if (!fs.existsSync(dir)) { fs.mkdirSync(dir, { recursive: true }); }
          const exts = ['.xlsx', '.xls', '.csv'];
          const files = fs.readdirSync(dir)
            .filter(f => exts.includes(path.extname(f).toLowerCase()) && !f.startsWith('.'))
            .sort();
          const today = new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
          const schedules = files.map((f, i) => ({
            id: String(Date.now() + i),
            file: f,
            label: path.basename(f, path.extname(f)).replace(/[_-]/g, ' '),
            addedAt: today
          }));
          const manifest = { schedules, generatedAt: new Date().toISOString() };
          fs.writeFileSync(path.join(dir, 'manifest.json'), JSON.stringify(manifest, null, 2) + '\n');
          console.log('Generated manifest with', schedules.length, 'schedule(s):', files.join(', '));
          "

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build static export
        run: npm run build

      - name: Copy Schedules/ into static output
        run: |
          mkdir -p out/Schedules
          cp -r Schedules/. out/Schedules/
          echo "Copied Schedules/ to out/Schedules/ — contents:"
          ls -la out/Schedules/

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
